<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body id="body">
    <header style="grid-area: header;">
        <h1 class="greeting" id="greeting">Welcome User</h1>
        <div class="headerBtn">
            <button class="expense" onclick="openExpenseForm()">Add Expense</button>
            <button class="income" onclick="openIncomeForm()">Add Income</button>
        </div>
    </header>
    <aside style="grid-area: aside;">
        <div class="logo">Expense Tracker</div>
        <nav>
            <ul>
                <li><a href="index.html"><i class="fa-solid fa-gauge"></i>Dashboard</a></li>
                <li><a href="expense.html"><i class="fa-solid fa-file-invoice"></i>Expenses</a></li>
                <li><a href="category.html"><i class="fa-solid fa-layer-group"></i>Categories</a></li>
                <li><a href="report.html"><i class="fa-solid fa-chart-line"></i>Report</a></li>
                <li><a href="settings.html"><i class="fa-solid fa-gear"></i>Settings</a></li>
            </ul>
        </nav>
    </aside>
    <main style="grid-area: main;">
       <h3 class="sTitle" id="sTitle">Settings</h3>
       <p class="sParagraph" id="sParagraph">Toggle on dark mode</p>
       <button onclick="onDarkMode()" class="sBtn">Turn on</button>
    </main>

    <script src="script.js"></script>
</body>

</html>
